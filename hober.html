<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
      .my-button {
        padding: 15px 30px;
        font-size: 18px;
        background-color: rgb(178, 228, 230);
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
      }

      .my-button:hover {
        background-color: PINK;
        transform: scale(1.05);
      }

      .my-button:focus {
        border: 3px solid yellow;
      }

      .my-button:active {
        transform: scale(0.5);
      }
    </style>
  </head>

  <body>
    <div style="margin-top: 50px; text-align: center">
      <button class="my-button">I am a button</button>
      <p>I am  paro</p>
    </div>
  </body>
</html>
