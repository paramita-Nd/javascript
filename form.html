<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Form</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-container {
      background: #fff;
      width: 540px;
      padding: 40px;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    .logo {
      text-align: center;
      font-size: 48px;
      font-weight: bold;
      margin-bottom: 25px;
    }

    .logo .green {
      color: #4CAF50;
    }

    .logo .blue {
      color: #2E86C1;
    }

    .title {
      text-align: center;
      font-size: 32px;
      font-weight: bold;
      margin-bottom: 35px;
    }

    .form-group {
      margin-bottom: 25px;
    }

    label {
      display: block;
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    input {
      width: 100%;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 18px;
    }

    .btn {
      width: 100%;
      padding: 16px;
      background: #4CAF50;
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 24px;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn:hover {
      background: #43a047;
    }

    .bottom-text {
      text-align: center;
      margin-top: 30px;
      font-size: 20px;
    }

    .bottom-text a {
      color: purple;
      text-decoration: none;
    }

    .bottom-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="login-container">

    <div class="logo">
      <span class="green">Geeksfor</span><span class="blue">Geeks</span>
    </div>

    <div class="title">
      Enter your login credentials
    </div>

    <form>
      <div class="form-group">
        <label>Username:</label>
        <input type="text" placeholder="Enter your Username">
      </div>

      <div class="form-group">
        <label>Password:</label>
        <input type="password" placeholder="Enter your Password">
      </div>

      <button type="submit" class="btn">Submit</button>

      <div class="bottom-text">
        Not registered?
        <a href="#">Create an account</a>
      </div>
    </form>

  </div>

</body>
</html>
