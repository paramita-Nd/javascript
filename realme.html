<html>
<head>
<title>Latest Style</title>
</head>

<body>

<div id="p"></div>

<script>

const product = {
    selected_colour : "Mosaic Green",
    brand : "Realme",
    Name : "P4 Lite 5G (Mosaic Green, 64) (4 GB RAM)",
    title : "Super deals",
    Price : 13499 ,
    Oldprice : 19999,
    offer : "33%",
    Extraoff : "Extra 12499 with Bank offer",
    img : "image/realme.jpeg"   
};

document.getElementById("p").innerHTML = `
<div style="width:250px; font-family:Arial;">
    
    <img src="${product.img}" width="100%">

    <p style="color:blue;"><b>${product.selected_colour}</b></p>

    <p><b>${product.brand}</b></p>

    <p>${product.Name}</p>
     <span style="color:green;">${product.title}</span>

    <p>
        ₹${product.Price}
        <del>₹${product.Oldprice}</del>
        <span style="color:green;">${product.offer}</span>
    </p>

    <p style="color:green;">${product.Extraoff}</p>

</div>
`;

</script>

</body>
</html>
