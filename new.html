<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

body{
    background:#e9f0f4;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:650px;
    background:#fff;
    padding:35px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#2470ff;
    margin-bottom:30px;
    font-size:48px;
    font-weight:bold;
}

.task-input{
    display:flex;
    gap:20px;
    margin-bottom:30px;
}

.task-input input{
    flex:1;
    padding:14px;
    border:3px solid #2470ff;
    border-radius:10px;
    font-size:18px;
}

.task-input button{
    padding:14px 28px;
    border:none;
    background:#2470ff;
    color:#fff;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

.task-list{
    list-style:none;
}

.task{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:22px 0;
    border-bottom:2px dotted #ddd;
}

.task-left{
    display:flex;
    align-items:center;
    gap:20px;
}

.check{
    color:#28c76f;
    font-size:32px;
    font-weight:bold;
}

.task-text{
    font-size:28px;
    color:#333;
}

.completed{
    text-decoration:line-through;
    color:#888;
}

.selected{
    width:65px;
    height:65px;
    border:3px solid #2470ff;
    border-radius:10px;
    display:flex;
    align-items:center;
    justify-content:center;
}

.remove-btn{
    background:#f44336;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:6px;
    font-size:18px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
    <h1>Task Manager</h1>

    <div class="task-input">
        <input type="text" placeholder="What needs to be done?">
        <button>Add Task</button>
    </div>

    <ul class="task-list">
        <li class="task">
            <div class="task-left">
                <span class="check">✓</span>
                <span class="task-text completed">Task A</span>
            </div>
            <button class="remove-btn">Remove</button>
        </li>

        <li class="task">
            <div class="task-left">
                <span class="check">✓</span>
                <span class="task-text">Task B</span>
            </div>
            <button class="remove-btn">Remove</button>
        </li>

        <li class="task">
            <div class="task-left">
                <div class="selected">
                    <span class="check">✓</span>
                </div>
                <span class="task-text completed">Task C</span>
            </div>
            <button class="remove-btn">Remove</button>
        </li>
    </ul>
</div>

</body>
</html>
